name: CI/CD Pipeline (No Docker Push)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-only:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: latest
      SONAR_PROJECT_KEY: Plutoaintaplanet_carml2
      SONAR_ORGANIZATION: plutoaintaplanet
      SONAR_HOST_URL: https://sonarcloud.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Run code quality (flake8)
        run: |
          python -m pip install flake8
          flake8 --max-line-length=120 CARML

      - name: Run SonarCloud analysis
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: .
          organization: ${{ env.SONAR_ORGANIZATION }}
          projectKey: ${{ env.SONAR_PROJECT_KEY }}
          token: ${{ secrets.SONAR_TOKEN }}

      - name: Run Trivy vulnerability scan
        uses: aquasec/trivy-action@v0.6.0
        with:
          scan-type: fs
          scan-path: CARML
          severity: HIGH,CRITICAL

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ${{ secrets.DOCKERHUB_REPO }}:${{ env.IMAGE_TAG }}

      - name: Install Vercel CLI
        run: npm install -g vercel@34

      - name: Deploy to Vercel
        env:
          VERCEL_SCOPE: ${{ secrets.VERCEL_SCOPE }}
        run: |
          vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }} --confirm --scope $VERCEL_SCOPE
